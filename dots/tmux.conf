set -g prefix C-s
# Enable mouse support
set -g mouse on

# Start windows at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Move panels
bind -n C-S-M-Left swap-window -t -1 \;  previous-window
bind -n C-S-M-Right swap-window -t +1 \; next-window

# Vim-style pane navigation
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Enter copy mode with prefix d
bind d copy-mode

# Copy to system clipboard (macOS)
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# Everforest dark medium theme
set -g status-position top
set -g status-style "bg=#232a2e,fg=#d3c6aa"
set -g status-left "#[fg=#232a2e,bg=#a7c080,bold] #S #[fg=#a7c080,bg=#232a2e,nobold]  "
set -g status-right "#[fg=#7fbbb3,bg=#232a2e] %H:%M  #[fg=#232a2e,bg=#7fbbb3,bold] #H "
set -g status-left-length 40
set -g status-right-length 60
set -g window-status-format "#[fg=#859289,bg=#232a2e] #I:#W "
set -g window-status-current-format "#[fg=#232a2e,bg=#e69875,bold] #I:#W #[fg=#e69875,bg=#232a2e,nobold]"
set -g window-status-separator ""
set -g message-style "fg=#d3c6aa,bg=#3d484d"
set -g pane-border-style "fg=#3d484d"
set -g pane-active-border-style "fg=#a7c080"

# dim inactive windows
set -g focus-events on
setw -g window-active-style 'fg=#d3c6aa,bg=#2d353b'
setw -g window-style 'fg=#859289,bg=#232a2e'




# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
